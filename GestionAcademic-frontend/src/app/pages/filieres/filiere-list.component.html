<p-fluid>
    <div class="flex flex-col gap-8">
        <div class="card flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div>
                    <div class="font-semibold text-xl">Gestion des filières</div>
                </div>

                <p-button
                    label="Actualiser"
                    icon="pi pi-refresh"
                    severity="secondary"
                    (onClick)="refreshFilieres()"
                ></p-button>
            </div>

            <div class="grid grid-cols-12 gap-4">
                <div class="col-span-12 md:col-span-4 flex flex-col gap-2">
                    <label for="nom">Nom</label>
                    <input
                        pInputText
                        id="nom"
                        type="text"
                        [(ngModel)]="filiere.nom"
                        name="nom"
                        placeholder="Ex: Génie logiciel"
                    />
                </div>

                <div class="col-span-12 md:col-span-5 flex flex-col gap-2">
                    <label for="description">Description</label>
                    <textarea
                        pTextarea
                        id="description"
                        rows="1"
                        [(ngModel)]="filiere.description"
                        name="description"
                        placeholder="Description de la filière"
                    ></textarea>
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <p-button
                    label="Annuler"
                    icon="pi pi-times"
                    severity="secondary"
                    (onClick)="resetForm()"
                ></p-button>

                <p-button
                    [label]="editMode ? 'Modifier' : 'Ajouter'"
                    [icon]="editMode ? 'pi pi-pencil' : 'pi pi-plus'"
                    (onClick)="saveFiliere()"
                ></p-button>
            </div>
        </div>

        <div class="card">
            <div class="font-semibold text-xl mb-4">Liste des filières</div>

            <p-table
                [value]="filieres"
                [paginator]="true"
                [rows]="5"
                [tableStyle]="{ 'min-width': '50rem' }"
                responsiveLayout="scroll"
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Description</th>
                        <th style="width: 180px">Actions</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-f>
                    <tr>
                        <td>{{ f.id }}</td>
                        <td>{{ f.nom }}</td>
                        <td>{{ f.description }}</td>
                        <td>
                            <div class="flex gap-2">
                                <p-button
                                    icon="pi pi-pencil"
                                    severity="info"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="editFiliere(f)"
                                ></p-button>

                                <p-button
                                    icon="pi pi-trash"
                                    severity="danger"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="deleteFiliere(f.id!)"
                                ></p-button>
                            </div>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="4" class="text-center">
                            Aucune filière trouvée.
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</p-fluid>
