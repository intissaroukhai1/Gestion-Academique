<p-fluid>
    <div class="flex flex-col gap-8">
        <div class="card flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div>
                    <div class="font-semibold text-xl">Gestion des matières</div>
                </div>

                <p-button
                    label="Actualiser"
                    icon="pi pi-refresh"
                    severity="secondary"
                    (onClick)="refreshMatieres()"
                ></p-button>
            </div>

            <div class="grid grid-cols-12 gap-4">
                <div class="col-span-12 md:col-span-4 flex flex-col gap-2">
                    <label for="nom">Nom *</label>
                    <input
                        pInputText
                        id="nom"
                        type="text"
                        [(ngModel)]="matiere.nom"
                        name="nom"
                        placeholder="Ex: Angular"
                    />
                </div>

                <div class="col-span-12 md:col-span-4 flex flex-col gap-2">
                    <label for="coefficient">Coefficient *</label>
                    <input
                        pInputText
                        id="coefficient"
                        type="number"
                        [(ngModel)]="matiere.coefficient"
                        name="coefficient"
                        placeholder="Ex: 2"
                    />
                </div>

                <div class="col-span-12 md:col-span-4 flex flex-col gap-2">
                    <label for="semestre">Semestre *</label>
                    <input
                        pInputText
                        id="semestre"
                        type="text"
                        [(ngModel)]="matiere.semestre"
                        name="semestre"
                        placeholder="Ex: S1"
                    />
                </div>

                <div class="col-span-12 md:col-span-6 flex flex-col gap-2">
                    <label for="filiere">Filière *</label>
                    <p-select
                        id="filiere"
                        name="filiere"
                        [(ngModel)]="matiere.filiere"
                        [options]="filieres"
                        optionLabel="nom"
                        placeholder="Choisir une filière"
                        class="w-full"
                        appendTo="body"
                    ></p-select>
                </div>

                <div class="col-span-12 md:col-span-6 flex flex-col gap-2">
                    <label for="description">Description</label>
                    <textarea
                        pTextarea
                        id="description"
                        rows="1"
                        [(ngModel)]="matiere.description"
                        name="description"
                        placeholder="Description de la matière"
                    ></textarea>
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <p-button
                    label="Annuler"
                    icon="pi pi-times"
                    severity="secondary"
                    (onClick)="resetForm()"
                ></p-button>

                <p-button
                    [label]="editMode ? 'Modifier' : 'Ajouter'"
                    [icon]="editMode ? 'pi pi-pencil' : 'pi pi-plus'"
                    (onClick)="saveMatiere()"
                ></p-button>
            </div>
        </div>

        <div class="card">
            <div class="font-semibold text-xl mb-4">Liste des matières</div>

            <p-table
                [value]="matieres"
                [paginator]="true"
                [rows]="5"
                [tableStyle]="{ 'min-width': '60rem' }"
                responsiveLayout="scroll"
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Coefficient</th>
                        <th>Semestre</th>
                        <th>Filière</th>
                        <th>Description</th>
                        <th style="width: 180px">Actions</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-m>
                    <tr>
                        <td>{{ m.id }}</td>
                        <td>{{ m.nom }}</td>
                        <td>{{ m.coefficient }}</td>
                        <td>{{ m.semestre }}</td>
                        <td>{{ m.filiere?.nom }}</td>
                        <td>{{ m.description }}</td>
                        <td>
                            <div class="flex gap-2">
                                <p-button
                                    icon="pi pi-pencil"
                                    severity="info"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="editMatiere(m)"
                                ></p-button>

                                <p-button
                                    icon="pi pi-trash"
                                    severity="danger"
                                    [rounded]="true"
                                    [text]="true"
                                    (onClick)="deleteMatiere(m.id!)"
                                ></p-button>
                            </div>
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="emptymessage">
                    <tr>
                        <td colspan="7" class="text-center">
                            Aucune matière trouvée.
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</p-fluid>
